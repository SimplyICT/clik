<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimplyClik — Project Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--panel:#161b22;--card:#1c2333;--hover:#252d3f;--text:#e6edf3;--muted:#8b949e;--accent:#00b4d8;--green:#00ff88;--red:#ff4757;--amber:#ff9500;--blue:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #2d2d3d;background:var(--panel);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar h1 span{color:var(--muted);font-size:12px;font-weight:400}
.topbar-actions{display:flex;gap:6px;flex-wrap:wrap}
.wrap{max-width:1300px;margin:0 auto;padding:16px 20px}
.btn{background:var(--card);color:var(--text);border:1px solid #2d2d3d;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--hover);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#0096b4}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:3px 8px;font-size:11px}

.project-tabs{display:flex;gap:4px;padding:10px 20px;background:var(--panel);border-bottom:1px solid #2d2d3d;overflow-x:auto;flex-wrap:nowrap}
.project-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;border:1px solid transparent;background:transparent}
.project-tab:hover{color:var(--text);background:var(--hover)}
.project-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(0,180,216,.08)}
.project-tab .count{color:var(--muted);font-size:10px;margin-left:4px}

.project-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.project-header h2{font-size:20px;font-weight:700}
.project-header p{color:var(--muted);font-size:13px;margin-top:2px}
.progress-ring{display:flex;align-items:center;gap:10px}
.progress-ring .num{font-size:22px;font-weight:700}
.progress-ring .sub{color:var(--muted);font-size:12px}
.progress-bar-wrap{height:6px;border-radius:999px;background:#0b1220;overflow:hidden;margin:6px 0 12px;flex:1;min-width:120px}
.progress-bar-fill{height:100%;border-radius:999px;background:var(--accent);transition:width .3s}
.progress-bar-fill.done{background:var(--green)}

.toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.filter-tab{background:var(--bg);border:1px solid #2d2d3d;border-radius:999px;padding:4px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-weight:600}
.filter-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(0,180,216,.08)}
.filter-tab .fc{color:var(--muted);font-size:10px;margin-left:2px}

.table-container{overflow-x:auto;border-radius:8px;border:1px solid #2d2d3d}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:1px solid #2d2d3d;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:var(--hover) !important}
.task-title{font-weight:600;cursor:pointer}
.task-title:hover{color:var(--accent)}
.task-desc{color:var(--muted);font-size:11px;margin-top:1px}
select.sel-status{background:var(--bg);color:var(--text);border:1px solid #2d2d3d;border-radius:4px;padding:2px 4px;font-size:11px;cursor:pointer;outline:none}
select.sel-status:focus{border-color:var(--accent)}

.status{display:inline-block;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap}
.status-not_started{background:rgba(100,116,139,.15);color:#94a3b8}
.status-in_progress{background:rgba(56,189,248,.12);color:#38bdf8}
.status-blocked{background:rgba(239,68,68,.12);color:#ef4444}
.status-review{background:rgba(245,158,11,.12);color:#f59e0b}
.status-done{background:rgba(34,197,94,.12);color:#22c55e}
.priority-box{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.priority-high{background:rgba(239,68,68,.12);color:#ef4444}
.priority-medium{background:rgba(245,158,11,.12);color:#f59e0b}
.priority-low{background:rgba(100,116,139,.12);color:#94a3b8}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-height:250px}
.kanban-col{background:rgba(255,255,255,.02);border:1px solid #2d2d3d;border-radius:10px;padding:10px;display:flex;flex-direction:column}
.kanban-col h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2d2d3d}
.kanban-card{background:var(--card);border:1px solid #2d2d3d;border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:grab;font-size:12px;transition:border-color .15s,opacity .15s}
.kanban-card:hover{border-color:var(--accent)}
.kanban-card.dragging{opacity:.5}
.kanban-card .k-title{font-weight:600;margin-bottom:2px}
.kanban-card .k-meta{font-size:10px;color:var(--muted);display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.kanban-empty{text-align:center;padding:16px;color:var(--muted);font-size:11px}

/* modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid #2d2d3d;border-radius:12px;padding:24px;width:500px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:14px}
.modal h3{font-size:13px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg);color:var(--text);border:1px solid #2d2d3d;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:50px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
input.task-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}

.inline-add{display:flex;gap:6px;padding:10px 12px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid #2d2d3d;border-radius:8px;margin-top:12px}
.inline-add input,.inline-add select{background:var(--bg);color:var(--text);border:1px solid #2d2d3d;border-radius:6px;padding:6px 10px;font-size:12px;outline:none}
.inline-add input:focus,.inline-add select:focus{border-color:var(--accent)}
.inline-add input[type="text"]{flex:1;min-width:160px}

.detail-panel{background:var(--card);border:1px solid #2d2d3d;border-radius:8px;padding:14px;margin-top:10px;display:none}
.detail-panel.show{display:block}
.detail-panel h4{font-size:14px;margin-bottom:6px}
.detail-panel .row{display:flex;gap:8px;margin-bottom:4px;font-size:12px}
.detail-panel .row .lbl{color:var(--muted);min-width:80px}

@media(max-width:768px){.kanban{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:stretch}.project-tabs{overflow-x:auto}}
</style>
</head>
<body>

<div class="topbar">
  <h1>&#128203; SimplyClik Project Tracker <span id="viewLabel">All Projects</span></h1>
  <div class="topbar-actions">
    <a class="btn btn-sm" href="/">&#9664; Home</a>
    <button class="btn btn-sm btn-primary" id="btnNewProject">+ New Sub-Project</button>
    <button class="btn btn-sm" onclick="location.reload()">Refresh</button>
    <button class="btn btn-sm" id="btnExportCSV" onclick="exportCSV()" style="display:none">CSV</button>
  </div>
</div>

<div id="projectTabs" class="project-tabs"></div>

<div class="wrap" id="content">
  <div class="empty">Loading...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <h2 id="modalTitle">New Sub-Project</h2>
    <div class="form-group"><label>Sub-Project Name</label><input id="fldName" placeholder="e.g. Admin Portal"></div>
    <div class="form-group"><label>Description</label><textarea id="fldDesc" placeholder="What is this sub-project about?"></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSave">Create</button>
    </div>
  </div>
</div>

<script>
var API = "";
var projects = [];
var currentProjectId = null;
var currentFilter = "all";
var kanbanView = false;

function $(id){return document.getElementById(id)}
function esc(v){var d=document.createElement("div");d.textContent=v;return d.innerHTML}

function loadTabs(){
  fetch(API+"/api/projects").then(function(r){return r.json()}).then(function(d){
    projects = d.projects || [];
    var h = '<span class="project-tab '+(currentProjectId===null?'active':'')+'" onclick="showAll()">&#9632; All Projects</span>';
    projects.forEach(function(p){
      h += '<span class="project-tab '+(currentProjectId===p.id?'active':'')+'" onclick="loadProject(\''+p.id+'\')">'+esc(p.name)+' <span class="count">'+p.done_tasks+'/'+p.total_tasks+'</span></span>';
    });
    $("projectTabs").innerHTML = h;
    if(currentProjectId === null) renderAll();
  });
}

function showAll(){
  currentProjectId = null;
  loadTabs();
}

function renderAll(){
  currentView = "list";
  $("viewLabel").textContent = "All Sub-Projects";
  $("btnExportCSV").style.display = "none";
  if(!projects.length){
    $("content").innerHTML = '<div class="empty"><p>No sub-projects yet. Click "+ New Sub-Project" to start.</p></div>';
    return;
  }
  var h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
  projects.forEach(function(p){
    var barClass = p.progress >= 100 ? "done" : "";
    h += '<div class="card" style="background:var(--card);border:1px solid #2d2d3d;border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s" onclick="loadProject(\''+p.id+'\')" onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'#2d2d3d\'">'
      + '<h3 style="font-size:15px;margin-bottom:2px">'+esc(p.name)+'</h3>'
      + '<p style="color:var(--muted);font-size:12px;margin-bottom:8px;line-height:1.4">'+esc(p.description||"")+'</p>'
      + '<div style="display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:6px">'
      + '<span>&#128203; '+p.total_tasks+' tasks</span><span>&#9989; '+p.done_tasks+' done</span></div>'
      + '<div style="height:5px;border-radius:999px;background:#0b1220;overflow:hidden;margin-bottom:4px"><div style="height:100%;border-radius:999px;background:'+(p.progress>=100?'var(--green)':'var(--accent)')+';width:'+p.progress+'%"></div></div>'
      + '<div style="color:var(--muted);font-size:10px">'+p.progress+'% complete</div>'
      + '</div>';
  });
  h += '</div>';
  $("content").innerHTML = h;
}

function loadProject(id){
  currentProjectId = id;
  currentFilter = "all";
  loadTabs();
  $("viewLabel").textContent = "Loading...";

  fetch(API+"/api/projects/"+id).then(function(r){return r.json()}).then(function(p){
    $("viewLabel").textContent = p.name;
    $("btnExportCSV").style.display = "inline-block";
    var tasks = p.tasks || [];
    var total = tasks.length;
    var done = tasks.filter(function(t){return t.status==="done"}).length;
    var progress = total ? Math.round(done/total*100) : 0;

    var h = '<div class="project-header"><div><h2>'+esc(p.name)+'</h2><p>'+esc(p.description||"")+'</p></div>'
      + '<div class="progress-ring"><div class="num">'+progress+'%</div><div class="sub">'+done+'/'+total+' done</div></div></div>'
      + '<div class="progress-bar-wrap"><div class="progress-bar-fill '+(progress>=100?'done':'')+'" style="width:'+progress+'%"></div></div>';

    h += '<div class="toolbar">'
      + '<button class="btn btn-sm" onclick="toggleView()">'+(kanbanView?'&#9776; List View':'&#9632; Kanban View')+'</button>'
      + '<button class="btn btn-sm" onclick="exportCSV()">CSV</button>'
      + '<button class="btn btn-sm btn-danger" onclick="deleteProject(\''+p.id+'\')">Delete Project</button>'
      + '</div>';

    if(kanbanView){
      h += renderKanban(tasks, p.id);
    } else {
      var statuses = [
        {k:"all",l:"All ("+total+")"},
        {k:"not_started",l:"To Do"},
        {k:"in_progress",l:"In Progress"},
        {k:"blocked",l:"Blocked"},
        {k:"review",l:"Review"},
        {k:"done",l:"Done"}
      ];
      h += '<div class="filter-tabs">';
      statuses.forEach(function(s){
        var count = tasks.filter(function(t){return s.k==="all"||t.status===s.k}).length;
        h += '<span class="filter-tab '+(currentFilter===s.k?'active':'')+'" onclick="filterTasks(\''+s.k+'\')">'+s.l+' <span class="fc">('+count+')</span></span>';
      });
      h += '</div>';

      var filtered = tasks;
      if(currentFilter!=="all") filtered = tasks.filter(function(t){return t.status===currentFilter});

      h += '<div class="table-container"><table><thead><tr>'
        + '<th style="width:28px"></th>'
        + '<th>Task</th>'
        + '<th>Status</th>'
        + '<th>Priority</th>'
        + '<th>Owner</th>'
        + '<th>Target</th>'
        + '<th style="width:28px"></th>'
        + '</tr></thead><tbody>';
      filtered.forEach(function(t){
        var checked = t.status==="done"?"checked":"";
        var pclass = t.priority||"medium";
        h += '<tr>'
          + '<td><input class="task-check" type="checkbox" '+checked+' onchange="toggleTask(\''+t.id+'\',this.checked)"></td>'
          + '<td><div class="task-title" onclick="showTaskDetail(\''+t.id+'\')">'+esc(t.title)+'</div>'
          + (t.description?'<div class="task-desc">'+esc(t.description.substring(0,80))+'</div>':'')
          + (t.subproject?'<span style="font-size:10px;color:var(--accent);margin-top:1px;display:inline-block">'+esc(t.subproject)+'</span>':'')
          + '</td>'
          + '<td><select class="sel-status" onchange="updateStatus(\''+t.id+'\',this.value)">'
          + ['not_started','in_progress','blocked','review','done'].map(function(s){
              return '<option value="'+s+'" '+(t.status===s?'selected':'')+'>'+s.replace(/_/g," ")+'</option>';
            }).join("")+'</select></td>'
          + '<td><span class="priority-box priority-'+pclass+'">'+esc(pclass)+'</span></td>'
          + '<td style="color:var(--muted);font-size:12px">'+esc(t.owner||"-")+'</td>'
          + '<td style="color:var(--muted);font-size:11px">'+(t.target_date||"-")+'</td>'
          + '<td><button class="btn btn-sm" style="padding:1px 5px;font-size:13px;color:var(--red)" onclick="deleteTask(\''+t.id+'\')">&#10005;</button></td>'
          + '</tr>';
      });
      h += '</tbody></table></div>';
    }

    h += '<div class="inline-add">'
      + '<input id="newTaskInput" placeholder="Task title..." onkeydown="if(event.key==\'Enter\')addTask()">'
      + '<select id="newTaskPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>'
      + '<select id="newTaskSubproject"><option value="">Sub-project...</option></select>'
      + '<input id="newTaskOwner" placeholder="Owner" style="width:100px">'
      + '<input id="newTaskPhase" placeholder="Phase" style="width:80px">'
      + '<button class="btn btn-primary btn-sm" onclick="addTask()">+ Add Task</button>'
      + '</div>';

    $("content").innerHTML = h;

    // populate subproject dropdown from other projects
    var spSel = $("newTaskSubproject");
    projects.forEach(function(proj){
      if(proj.id !== id){
        spSel.innerHTML += '<option value="'+esc(proj.name)+'">'+esc(proj.name)+'</option>';
      }
    });
  }).catch(function(e){
    $("content").innerHTML = '<div class="empty">Failed to load project: '+esc(e.message)+'</div>';
  });
}

function filterTasks(status){
  currentFilter = status;
  loadProject(currentProjectId);
}

function toggleView(){
  kanbanView = !kanbanView;
  if(currentProjectId) loadProject(currentProjectId);
}

function renderKanban(tasks, projectId){
  var cols = ["not_started","in_progress","blocked","review","done"];
  var labels = {"not_started":"To Do","in_progress":"In Progress","blocked":"Blocked","review":"Review","done":"Done"};
  var h = '<div class="kanban">';
  cols.forEach(function(col){
    var items = tasks.filter(function(t){return t.status===col});
    h += '<div class="kanban-col" data-status="'+col+'"><h4>'+labels[col]+' ('+items.length+')</h4>';
    if(items.length){
      items.forEach(function(t){
        var pclass = t.priority||"medium";
        h += '<div class="kanban-card" draggable="true" data-id="'+t.id+'" ondragstart="kDragStart(event)" ondragend="kDragEnd(event)">'
          + '<div class="k-title">'+esc(t.title)+'</div>'
          + '<div class="k-meta">'
          + '<span class="priority-box priority-'+pclass+'">'+esc(pclass)+'</span>'
          + (t.owner?'<span>'+esc(t.owner)+'</span>':'')
          + (t.subproject?'<span style="color:var(--accent)">'+esc(t.subproject)+'</span>':'')
          + '</div></div>';
      });
    } else {
      h += '<div class="kanban-empty">No tasks</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function kDragStart(e){e.dataTransfer.setData("text/plain",e.target.dataset.id);e.target.classList.add("dragging")}
function kDragEnd(e){e.target.classList.remove("dragging")}
document.addEventListener("dragover",function(e){var col=e.target.closest(".kanban-col");if(col){e.preventDefault();col.classList.add("drag-over")}});
document.addEventListener("dragleave",function(e){var col=e.target.closest(".kanban-col");if(col)col.classList.remove("drag-over")});
document.addEventListener("drop",function(e){
  var col=e.target.closest(".kanban-col");
  if(!col)return;e.preventDefault();col.classList.remove("drag-over");
  var taskId=e.dataTransfer.getData("text/plain");
  if(!taskId)return;
  var newStatus=col.dataset.status;
  fetch(API+"/api/tasks/"+taskId,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:newStatus})})
  .then(function(){if(currentProjectId)loadProject(currentProjectId)});
});

function addTask(){
  var title = $("newTaskInput").value.trim();
  if(!title) return;
  var priority = $("newTaskPriority").value;
  var owner = $("newTaskOwner").value.trim();
  var subproject = $("newTaskSubproject").value;
  var phase = $("newTaskPhase").value.trim();
  var body = {title:title, priority:priority, owner:owner};
  if(subproject) body.subproject = subproject;
  if(phase) body.phase = phase;
  fetch(API+"/api/projects/"+currentProjectId+"/tasks",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
  .then(function(){loadProject(currentProjectId)})
  .catch(function(e){alert("Failed: "+e.message)});
}

function toggleTask(id,checked){
  fetch(API+"/api/tasks/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:checked?"done":"not_started"})})
  .then(function(){if(currentProjectId)loadProject(currentProjectId)});
}

function updateStatus(id,status){
  fetch(API+"/api/tasks/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:status})})
  .then(function(){if(currentProjectId)loadProject(currentProjectId)});
}

function deleteTask(id){
  if(!confirm("Delete this task?")) return;
  fetch(API+"/api/tasks/"+id,{method:"DELETE"}).then(function(){loadProject(currentProjectId)});
}

function deleteProject(id){
  if(!confirm("Delete this sub-project and all its tasks?")) return;
  fetch(API+"/api/projects/"+id,{method:"DELETE"}).then(function(){currentProjectId=null;loadTabs()});
}

function showTaskDetail(id){
  fetch(API+"/api/tasks/"+id).then(function(r){return r.json()}).then(function(t){
    var h = '<h2>'+esc(t.title)+'</h2>';
    if(t.description) h += '<p style="color:var(--muted);font-size:13px;margin-bottom:12px">'+esc(t.description)+'</p>';
    h += '<div class="row"><span class="lbl">Status:</span><span class="status status-'+t.status+'">'+t.status.replace(/_/g," ")+'</span></div>';
    h += '<div class="row"><span class="lbl">Priority:</span><span class="priority-box priority-'+t.priority+'">'+esc(t.priority)+'</span></div>';
    if(t.owner) h += '<div class="row"><span class="lbl">Owner:</span>'+esc(t.owner)+'</div>';
    if(t.subproject) h += '<div class="row"><span class="lbl">Sub-Project:</span>'+esc(t.subproject)+'</div>';
    if(t.phase) h += '<div class="row"><span class="lbl">Phase:</span>'+esc(t.phase)+'</div>';
    if(t.target_date) h += '<div class="row"><span class="lbl">Target:</span>'+esc(t.target_date)+'</div>';
    if(t.notes) h += '<div class="row"><span class="lbl">Notes:</span>'+esc(t.notes)+'</div>';
    if(t.dependencies && t.dependencies.length) h += '<div class="row"><span class="lbl">Dependencies:</span>'+t.dependencies.join(", ")+'</div>';
    h += '<div class="form-group" style="margin-top:12px"><label>Notes</label><textarea id="fldTaskNotes" rows="3">'+esc(t.notes||"")+'</textarea></div>';
    h += '<div class="form-actions"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="saveTaskNotes(\''+t.id+'\')">Save Notes</button></div>';
    $("modalContent").innerHTML = h;
    openModal();
  });
}

function saveTaskNotes(id){
  var notes = $("fldTaskNotes").value;
  fetch(API+"/api/tasks/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({notes:notes})})
  .then(function(){closeModal();if(currentProjectId)loadProject(currentProjectId)});
}

function exportCSV(){
  if(!currentProjectId)return;
  fetch(API+"/api/projects/"+currentProjectId).then(function(r){return r.json()}).then(function(p){
    var tasks = p.tasks||[];
    var lines = ["Title,Status,Priority,Owner,Sub-Project,Phase,Target Date,Notes,ID"];
    tasks.forEach(function(t){
      lines.push('"'+esc(t.title)+'","'+t.status+'","'+(t.priority||"medium")+'","'+(t.owner||"")+'","'+(t.subproject||"")+'","'+(t.phase||"")+'","'+(t.target_date||"")+'","'+(t.notes||"")+'","'+t.id+'"');
    });
    var csv = lines.join("\n");
    var blob = new Blob([csv],{type:"text/csv"});
    var a = document.createElement("a");a.href=URL.createObjectURL(blob);a.download=p.name.replace(/\s+/g,"_")+"_tasks.csv";a.click();
  });
}

function openModal(){$("modalOverlay").classList.add("show")}
function closeModal(){$("modalOverlay").classList.remove("show");$("modalContent").innerHTML = $("modalContent").innerHTML}
$("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});

$("btnNewProject").addEventListener("click",function(){
  $("modalTitle").textContent = "New Sub-Project";
  $("fldName").value = "";
  $("fldDesc").value = "";
  $("fldName").focus();
  $("modalSave").textContent = "Create";
  $("modalSave").onclick = function(){
    var name = $("fldName").value.trim();
    if(!name) return;
    var desc = $("fldDesc").value.trim();
    fetch(API+"/api/projects",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name,description:desc})})
    .then(function(r){return r.json()}).then(function(){closeModal();loadTabs()})
    .catch(function(e){alert("Failed: "+e.message)});
  };
  openModal();
});

loadTabs();
setInterval(function(){
  if(currentProjectId === null) loadTabs();
  else loadProject(currentProjectId);
}, 60000);
</script>
</body>
