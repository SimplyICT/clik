name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: pip install fastapi uvicorn pg8000 bcrypt apscheduler reportlab httpx
      - name: Check Python syntax
        run: |
          python -m py_compile server/fastapi_app.py
          python -m py_compile server/asset_service/permissions.py
          python -m py_compile server/asset_service/permissions_routes.py
          for f in server/asset_service/routes.py server/asset_service/documents/routes.py server/asset_service/costs/routes.py server/asset_service/maintenance/routes.py server/asset_service/work_orders/routes.py server/asset_service/imports/routes.py server/asset_service/reports/routes.py; do
            python -m py_compile "$f"
          done
      - name: Build admin frontend
        run: |
          cd web-admin && npm install && npm run build
      - name: Build portal frontend
        run: |
          cd web-portal && npm install && npm run build
      - name: Build mobile frontend
        run: |
          cd web-mobile && npm install && npm run build

  # Tests require Supabase infrastructure with seed data — run manually
