# SimplyClik nGinx Reverse Proxy (inf02)
# Single gateway for admin, portal, and API on port 80/443
server {
    listen 80;
    server_name simplyclik.app www.simplyclik.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name simplyclik.app www.simplyclik.app;

    # SSL (configure with certbot or your cert provider)
    ssl_certificate /etc/ssl/simplyclik/fullchain.pem;
    ssl_certificate_key /etc/ssl/simplyclik/privkey.pem;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /portal/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SPA caching
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
