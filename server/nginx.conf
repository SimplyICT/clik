# SimplyClik nGinx Reverse Proxy — single gateway on port 80
# Run these steps as root to enable HTTPS + push notifications:
#
#   1. Point pwa.simplyclik.com DNS A record to this server's IP
#   2. Run: certbot --nginx -d pwa.simplyclik.com
#      This auto-configures SSL in this file
#   3. Restart servers on internal ports (coming soon)

server {
    server_name pwa.simplyclik.com;

    # Mobile PWA
    location /mobile/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Portal
    location /portal/ {
        proxy_pass http://127.0.0.1:30002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:30001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin
    location / {
        proxy_pass http://127.0.0.1:30001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pwa.simplyclik.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pwa.simplyclik.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
